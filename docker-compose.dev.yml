version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: photovault-db
    environment:
      POSTGRES_USER: photovault
      POSTGRES_PASSWORD: photovault
      POSTGRES_DB: photovault
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photovault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
