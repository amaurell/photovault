version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: photovault-db
    restart: always
    environment:
      POSTGRES_USER: photovault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photovault}
      POSTGRES_DB: photovault
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photovault"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photovault-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: postgresql://photovault:${POSTGRES_PASSWORD:-photovault}@postgres:5432/photovault?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20971520}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: photovault-web
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      API_URL: http://backend:3001

volumes:
  pgdata:
  uploads:
  logs:
